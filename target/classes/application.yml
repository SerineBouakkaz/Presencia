spring:
  datasource:
    url: jdbc:mysql://localhost:3306/presencia_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  sql:
    init:
      mode: never
  h2:
    console:
      enabled: false
  web:
    resources:
      static-locations: classpath:/static/,classpath:/public/
  mvc:
    view:
      prefix: /WEB-INF/jsp/
      suffix: .jsp

server:
  port: 8081
  # Required for session cookies to work through ngrok (HTTPS reverse proxy)
  servlet:
    session:
      cookie:
        same-site: none
        secure: false   # set to true if you always use HTTPS ngrok
        http-only: true
  # Trust the X-Forwarded-* headers sent by ngrok
  forward-headers-strategy: native

logging:
  level:
    com.presencia.dao: DEBUG
    org.springframework.web: INFO
